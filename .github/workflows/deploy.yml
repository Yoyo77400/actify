name: Deploy Actify

# Chaîné sur la CI (workflow_run) : ne se déclenche qu'à la fin d'un run du
# workflow "CI" sur main — plus jamais en parallèle d'une CI qui pourrait
# échouer. Le job filtre ensuite sur conclusion == success.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Un seul déploiement à la fois ; les runs suivants attendent la fin du courant.
concurrency:
  group: deploy-actify
  cancel-in-progress: false

jobs:
  deploy:
    # `event == 'push'` est obligatoire : une PR du fork upstream avec une head
    # branch nommée "main" produirait aussi un run CI retenu par le filtre
    # branches ci-dessus — seul un vrai push sur main doit déployer.
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/actify
            # Aligne le VPS exactement sur origin/main (peu importe sa branche actuelle).
            # Le .env de prod est gitignored → préservé.
            git fetch --prune origin
            git checkout -B main origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            # Vérifie que la stack est saine (laisse le temps au healthcheck de remonter)
            curl -fsS --retry 10 --retry-delay 3 --retry-all-errors \
              https://actify.yohan-georgelin.fr/api/v1/health
